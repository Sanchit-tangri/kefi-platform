version: '3.8'

services:
  # Primary Relational Database for Users and Metadata
  postgres:
    image: postgres:15-alpine
    container_name: kefi_postgres
    environment:
      POSTGRES_USER: kefi_admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: kefi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # In-Memory Data Store for WebSockets and Live State
  redis:
    image: redis:7-alpine
    container_name: kefi_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: